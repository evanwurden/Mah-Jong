<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mah Jong</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1a5c3a;
            --primary-light: #2d8a5e;
            --accent: #c9a84c;
            --bg: #f5f0e8;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-light: #666;
            --border: #ddd;
            --sitout-bg: #fff3cd;
            --table-colors: #e8f5e9, #e3f2fd, #fce4ec, #f3e5f5, #fff8e1, #e0f7fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .input-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .input-section h2 {
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group small {
            display: block;
            color: var(--text-light);
            margin-top: 0.3rem;
        }

        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .config-row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-row .form-group {
            flex: 1;
            min-width: 150px;
        }

        input[type="number"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--primary-light);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: var(--accent);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #b8943f;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .info-box {
            background: #e8f5e9;
            border-left: 4px solid var(--primary);
            padding: 1rem 1.2rem;
            border-radius: 0 8px 8px 0;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .info-box strong {
            color: var(--primary);
        }

        .schedule-output {
            display: none;
        }

        .schedule-output.visible {
            display: block;
        }

        .round {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border);
        }

        .round-header h3 {
            color: var(--primary);
            font-size: 1.2rem;
        }

        .round-header .sitout-badge {
            background: var(--sitout-bg);
            color: #856404;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .table-card {
            border-radius: 8px;
            padding: 1rem;
            border: 2px solid transparent;
        }

        .table-card:nth-child(6n+1) { background: #e8f5e9; border-color: #a5d6a7; }
        .table-card:nth-child(6n+2) { background: #e3f2fd; border-color: #90caf9; }
        .table-card:nth-child(6n+3) { background: #fce4ec; border-color: #f48fb1; }
        .table-card:nth-child(6n+4) { background: #f3e5f5; border-color: #ce93d8; }
        .table-card:nth-child(6n+5) { background: #fff8e1; border-color: #ffe082; }
        .table-card:nth-child(6n+6) { background: #e0f7fa; border-color: #80deea; }

        .table-card h4 {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-card ul {
            list-style: none;
            padding: 0;
        }

        .table-card li {
            padding: 0.3rem 0;
            font-weight: 500;
        }

        .stats-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .stats-section h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            padding: 0.8rem;
            background: var(--bg);
            border-radius: 8px;
        }

        .stat-card .player-name {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .stat-card .stat-details {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .print-only {
            display: none;
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }

            .input-section, .actions, .btn, .no-print {
                display: none !important;
            }

            .print-only {
                display: block;
            }

            .schedule-output {
                display: block !important;
            }

            .round {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ccc;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.6rem;
            }

            .config-row {
                flex-direction: column;
                gap: 0.8rem;
            }

            .tables-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🀄 Mah Jong</h1>
        <p class="subtitle">Generate balanced round-robin schedules for your Mah Jong tournament</p>

        <div class="input-section">
            <h2>Setup</h2>
            <div class="form-group">
                <label for="players">Player Names</label>
                <textarea id="players" placeholder="Enter player names, one per line&#10;&#10;Example:&#10;Alice&#10;Bob&#10;Charlie&#10;Diana"></textarea>
                <small>One name per line. Minimum 4 players required.</small>
            </div>

            <div class="config-row">
                <div class="form-group">
                    <label for="rounds">Number of Rounds</label>
                    <input type="number" id="rounds" min="1" max="100" value="14">
                </div>
                <div class="form-group">
                    <label for="tables">Tables per Round</label>
                    <input type="number" id="tables" min="1" max="25" value="3">
                    <small>4 players per table</small>
                </div>
            </div>

            <div id="config-info" class="info-box" style="display:none;"></div>

            <div class="actions">
                <button class="btn" onclick="generateSchedule()">Generate Schedule</button>
                <button class="btn btn-secondary" onclick="printSchedule()">Print / Export</button>
                <button class="btn btn-secondary" onclick="exportToExcel()">📊 Export to Excel</button>
            </div>
        </div>

        <div id="output" class="schedule-output">
            <div id="schedule-content"></div>
            <div id="stats-content"></div>
        </div>
    </div>

    <script>
        // Update info box when inputs change
        document.getElementById('players').addEventListener('input', updateInfo);
        document.getElementById('rounds').addEventListener('input', updateInfo);
        document.getElementById('tables').addEventListener('input', updateInfo);

        function updateInfo() {
            const players = getPlayerNames();
            const rounds = parseInt(document.getElementById('rounds').value) || 0;
            const tables = parseInt(document.getElementById('tables').value) || 0;
            const infoBox = document.getElementById('config-info');

            if (players.length >= 4) {
                const seatsPerRound = tables * 4;
                const sitoutsPerRound = players.length - seatsPerRound;

                let html = `<strong>${players.length} players</strong> &bull; ${rounds} rounds &bull; ${tables} tables per round`;

                if (sitoutsPerRound > 0) {
                    html += ` &bull; <strong>${sitoutsPerRound} sit-out${sitoutsPerRound > 1 ? 's' : ''}</strong> per round`;
                } else if (sitoutsPerRound < 0) {
                    html += ` &bull; ⚠️ Not enough players to fill ${tables} tables!`;
                }

                infoBox.innerHTML = html;
                infoBox.style.display = 'block';
            } else {
                infoBox.style.display = 'none';
            }
        }

        function getPlayerNames() {
            const text = document.getElementById('players').value.trim();
            if (!text) return [];
            return text.split('\n').map(n => n.trim()).filter(n => n.length > 0);
        }

        function generateSchedule() {
            const players = getPlayerNames();
            const numRounds = parseInt(document.getElementById('rounds').value);
            const numTables = parseInt(document.getElementById('tables').value);

            if (players.length < 4) {
                alert('Please enter at least 4 player names.');
                return;
            }

            if (numTables * 4 > players.length) {
                alert(`Not enough players for ${numTables} tables. You need at least ${numTables * 4} players.`);
                return;
            }

            if (numRounds < 1) {
                alert('Please enter at least 1 round.');
                return;
            }

            const schedule = createBalancedSchedule(players, numRounds, numTables);
            lastSchedule = schedule;
            lastPlayers = players;
            renderSchedule(schedule, players);
            renderStats(schedule, players);

            document.getElementById('output').classList.add('visible');
            document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
        }

        function createBalancedSchedule(players, numRounds, numTables) {
            const n = players.length;
            const seatsPerRound = numTables * 4;
            const sitoutsPerRound = n - seatsPerRound;

            // Track how many times each player has sat out
            const sitoutCounts = new Array(n).fill(0);
            // Track how many times each pair has played together
            const pairCounts = Array.from({ length: n }, () => new Array(n).fill(0));
            // Track how many times each player has been at each table position
            const tableCounts = Array.from({ length: n }, () => new Array(numTables).fill(0));

            const rounds = [];

            for (let round = 0; round < numRounds; round++) {
                // Determine sit-outs: pick players with fewest sit-outs, break ties randomly
                let sitouts = [];
                if (sitoutsPerRound > 0) {
                    const indices = Array.from({ length: n }, (_, i) => i);
                    // Sort by sitout count (ascending), then random for ties
                    indices.sort((a, b) => {
                        const diff = sitoutCounts[a] - sitoutCounts[b];
                        if (diff !== 0) return diff;
                        return Math.random() - 0.5;
                    });
                    // Pick the ones with most sitouts last - we want those with fewest
                    // Actually we sorted ascending, so first ones have fewest sitouts
                    // We want to sit out those who have sat out least? No - we want fairness
                    // Everyone should sit out roughly equally, so pick those with FEWEST sitouts
                    // Wait - that's wrong. We want to sit out those who have sat out the LEAST
                    // so they "catch up". Actually no - we want to pick those who have sat out
                    // the LEAST to sit out this time? That doesn't make sense either.
                    // 
                    // Correct logic: sit out those who have sat out the FEWEST times,
                    // so everyone's sit-out count stays balanced.
                    // Actually: We pick the players with LOWEST sit-out count to sit out now,
                    // which balances everyone toward equal sit-outs.
                    
                    // Hmm, let me reconsider. If we have 14 players and 2 sitouts per round,
                    // over 14 rounds that's 28 total sitouts / 14 players = 2 each.
                    // To balance: each round, pick the players who have the fewest sitouts so far.
                    sitouts = indices.slice(0, sitoutsPerRound);
                }

                // Players available this round
                const available = [];
                for (let i = 0; i < n; i++) {
                    if (!sitouts.includes(i)) {
                        available.push(i);
                    }
                }

                // Assign available players to tables, minimizing repeat pairings
                const tables = assignTables(available, numTables, pairCounts, tableCounts);

                // Update tracking
                for (const si of sitouts) {
                    sitoutCounts[si]++;
                }

                for (let t = 0; t < tables.length; t++) {
                    const table = tables[t];
                    for (let i = 0; i < table.length; i++) {
                        tableCounts[table[i]][t]++;
                        for (let j = i + 1; j < table.length; j++) {
                            pairCounts[table[i]][table[j]]++;
                            pairCounts[table[j]][table[i]]++;
                        }
                    }
                }

                rounds.push({
                    tables: tables.map(t => t.map(i => players[i])),
                    sitouts: sitouts.map(i => players[i])
                });
            }

            return rounds;
        }

        function assignTables(available, numTables, pairCounts, tableCounts) {
            // Greedy approach: try multiple random arrangements and pick the best one
            const playersPerTable = 4;
            let bestTables = null;
            let bestScore = Infinity;

            const attempts = 50;

            for (let attempt = 0; attempt < attempts; attempt++) {
                // Shuffle available players
                const shuffled = [...available];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }

                // Assign to tables sequentially
                const tables = [];
                for (let t = 0; t < numTables; t++) {
                    tables.push(shuffled.slice(t * playersPerTable, (t + 1) * playersPerTable));
                }

                // Score: sum of pair counts for all pairs at same table (lower is better)
                let score = 0;
                for (const table of tables) {
                    for (let i = 0; i < table.length; i++) {
                        for (let j = i + 1; j < table.length; j++) {
                            score += pairCounts[table[i]][table[j]] * 2;
                        }
                    }
                }

                // Also penalize table position repetition slightly
                for (let t = 0; t < tables.length; t++) {
                    for (const p of tables[t]) {
                        score += tableCounts[p][t] * 0.1;
                    }
                }

                if (score < bestScore) {
                    bestScore = score;
                    bestTables = tables;
                }
            }

            return bestTables;
        }

        function renderSchedule(schedule, players) {
            const container = document.getElementById('schedule-content');
            let html = '';

            schedule.forEach((round, idx) => {
                html += `<div class="round">`;
                html += `<div class="round-header">`;
                html += `<h3>Round ${idx + 1}</h3>`;
                if (round.sitouts.length > 0) {
                    html += `<span class="sitout-badge">Sit out: ${round.sitouts.join(', ')}</span>`;
                }
                html += `</div>`;
                html += `<div class="tables-grid">`;

                round.tables.forEach((table, tIdx) => {
                    html += `<div class="table-card">`;
                    html += `<h4>Table ${tIdx + 1}</h4>`;
                    html += `<ul>`;
                    table.forEach(player => {
                        html += `<li>${escapeHtml(player)}</li>`;
                    });
                    html += `</ul></div>`;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        function renderStats(schedule, players) {
            const container = document.getElementById('stats-content');
            const n = players.length;

            // Calculate stats
            const sitoutCounts = {};
            const opponentCounts = {};

            players.forEach(p => {
                sitoutCounts[p] = 0;
                opponentCounts[p] = {};
                players.forEach(q => {
                    if (p !== q) opponentCounts[p][q] = 0;
                });
            });

            schedule.forEach(round => {
                round.sitouts.forEach(p => sitoutCounts[p]++);
                round.tables.forEach(table => {
                    for (let i = 0; i < table.length; i++) {
                        for (let j = i + 1; j < table.length; j++) {
                            opponentCounts[table[i]][table[j]]++;
                            opponentCounts[table[j]][table[i]]++;
                        }
                    }
                });
            });

            let html = `<div class="stats-section">`;
            html += `<h3>Player Statistics</h3>`;
            html += `<div class="stats-grid">`;

            players.forEach(player => {
                const opponents = Object.entries(opponentCounts[player]);
                const maxOpponent = opponents.reduce((a, b) => b[1] > a[1] ? b : a);
                const minOpponent = opponents.reduce((a, b) => b[1] < a[1] ? b : a);
                const totalGames = schedule.length - sitoutCounts[player];

                html += `<div class="stat-card">`;
                html += `<div class="player-name">${escapeHtml(player)}</div>`;
                html += `<div class="stat-details">`;
                html += `Games: ${totalGames} &bull; Sit-outs: ${sitoutCounts[player]}<br>`;
                html += `Most paired: ${escapeHtml(maxOpponent[0])} (${maxOpponent[1]}x)<br>`;
                html += `Least paired: ${escapeHtml(minOpponent[0])} (${minOpponent[1]}x)`;
                html += `</div></div>`;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function printSchedule() {
            if (!document.getElementById('output').classList.contains('visible')) {
                alert('Please generate a schedule first.');
                return;
            }
            window.print();
        }

        // Store the last generated schedule globally for export
        let lastSchedule = null;
        let lastPlayers = null;

        function exportToExcel() {
            if (!lastSchedule || !lastPlayers) {
                alert('Please generate a schedule first.');
                return;
            }

            const wb = XLSX.utils.book_new();
            const numTables = lastSchedule[0].tables.length;

            // --- Sheet 1: Full Schedule ---
            const scheduleData = [];
            // Header row
            const header = ['Round'];
            for (let t = 1; t <= numTables; t++) {
                header.push(`Table ${t} - P1`, `Table ${t} - P2`, `Table ${t} - P3`, `Table ${t} - P4`);
            }
            header.push('Sit-outs');
            scheduleData.push(header);

            lastSchedule.forEach((round, idx) => {
                const row = [`Round ${idx + 1}`];
                round.tables.forEach(table => {
                    table.forEach(player => row.push(player));
                });
                row.push(round.sitouts.join(', '));
                scheduleData.push(row);
            });

            const wsSchedule = XLSX.utils.aoa_to_sheet(scheduleData);
            // Set column widths
            wsSchedule['!cols'] = header.map(() => ({ wch: 14 }));
            XLSX.utils.book_append_sheet(wb, wsSchedule, 'Schedule');

            // --- Sheet 2: By Round (one table per section, more readable) ---
            const readableData = [];
            lastSchedule.forEach((round, idx) => {
                readableData.push([`Round ${idx + 1}`]);
                round.tables.forEach((table, tIdx) => {
                    readableData.push([`  Table ${tIdx + 1}:`, ...table]);
                });
                if (round.sitouts.length > 0) {
                    readableData.push([`  Sit-outs:`, ...round.sitouts]);
                }
                readableData.push([]);  // blank row separator
            });

            const wsReadable = XLSX.utils.aoa_to_sheet(readableData);
            wsReadable['!cols'] = [{ wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }];
            XLSX.utils.book_append_sheet(wb, wsReadable, 'Readable View');

            // --- Sheet 3: Player Stats ---
            const statsData = [['Player', 'Games Played', 'Sit-outs', 'Most Paired With', 'Times', 'Least Paired With', 'Times']];

            const sitoutCounts = {};
            const opponentCounts = {};
            lastPlayers.forEach(p => {
                sitoutCounts[p] = 0;
                opponentCounts[p] = {};
                lastPlayers.forEach(q => {
                    if (p !== q) opponentCounts[p][q] = 0;
                });
            });

            lastSchedule.forEach(round => {
                round.sitouts.forEach(p => sitoutCounts[p]++);
                round.tables.forEach(table => {
                    for (let i = 0; i < table.length; i++) {
                        for (let j = i + 1; j < table.length; j++) {
                            opponentCounts[table[i]][table[j]]++;
                            opponentCounts[table[j]][table[i]]++;
                        }
                    }
                });
            });

            lastPlayers.forEach(player => {
                const opponents = Object.entries(opponentCounts[player]);
                const maxOpp = opponents.reduce((a, b) => b[1] > a[1] ? b : a);
                const minOpp = opponents.reduce((a, b) => b[1] < a[1] ? b : a);
                const totalGames = lastSchedule.length - sitoutCounts[player];
                statsData.push([player, totalGames, sitoutCounts[player], maxOpp[0], maxOpp[1], minOpp[0], minOpp[1]]);
            });

            const wsStats = XLSX.utils.aoa_to_sheet(statsData);
            wsStats['!cols'] = [{ wch: 16 }, { wch: 13 }, { wch: 9 }, { wch: 16 }, { wch: 6 }, { wch: 16 }, { wch: 6 }];
            XLSX.utils.book_append_sheet(wb, wsStats, 'Player Stats');

            // --- Sheet 4: Pairing Matrix ---
            const matrixData = [['', ...lastPlayers]];
            lastPlayers.forEach(p => {
                const row = [p];
                lastPlayers.forEach(q => {
                    row.push(p === q ? '-' : opponentCounts[p][q]);
                });
                matrixData.push(row);
            });

            const wsMatrix = XLSX.utils.aoa_to_sheet(matrixData);
            wsMatrix['!cols'] = [{ wch: 14 }, ...lastPlayers.map(() => ({ wch: 10 }))];
            XLSX.utils.book_append_sheet(wb, wsMatrix, 'Pairing Matrix');

            // Download
            XLSX.writeFile(wb, 'mahjong_bracket.xlsx');
        }

        // Initialize info on load
        updateInfo();
    </script>
</body>
</html>
